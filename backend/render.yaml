# Render Blueprint — defines all services for one-click deploy
# https://render.com/docs/blueprint-spec

services:
  # FastAPI Backend
  - type: web
    name: kra-kpa-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: backend
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-ada-002
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: VECTOR_DB_PROVIDER
        value: chromadb
      - key: VECTOR_DB_URL
        value: https://api.trychroma.com
      - key: VECTOR_DB_API_KEY
        sync: false  # Set to your Chroma Cloud API key
      - key: CHROMA_TENANT
        sync: false  # Set to your Chroma Cloud tenant ID
      - key: CHROMA_DATABASE
        sync: false  # Set to your Chroma Cloud database name
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_EMBEDDING_MODEL
        value: models/gemini-embedding-001
      - key: GOOGLE_CHAT_MODEL
        value: gemini-2.0-flash
