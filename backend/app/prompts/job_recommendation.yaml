name: job_recommendation
description: Template for job recommendation. Instructs the LLM to analyze a resume against job matches and produce a ranked JSON array of recommendations with confidence scores.
required_variables:
  - resume_text
  - job_matches
template: |
  You are a job recommendation assistant. Analyze the following resume against the provided job matches and produce a ranked list of the top job recommendations.

  Resume:
  {resume_text}

  Available Job Matches:
  {job_matches}

  Instructions:
  - Compare the candidate's skills, experience, and qualifications against each job match.
  - Rank the jobs by relevance to the candidate's profile.
  - Return at most 5 recommendations, ordered by confidence score (highest first).
  - For each recommendation, provide a clear reason explaining why the job is a good match.
  - Confidence scores must be between 0.0 and 1.0.

  Return your response as a JSON array with the following structure:
  [
    {{
      "job_title": "Title of the job",
      "job_id": "Unique job identifier",
      "match_reason": "Explanation of why this job matches the candidate",
      "confidence_score": 0.95
    }}
  ]

  Return only the JSON array, no additional text.
